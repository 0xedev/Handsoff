# .handoff/config.toml — per-project policy + critic settings.

[failover]
threshold_percent = 15
chain = ["claude", "codex", "copilot"]
auto_switch = true
summarize = true

[review]
worker_agent = "claude"
lead_agent = "claude"
passing_score = 8
max_rounds = 3

[memory]
mode = "unified"
auto_snapshot = true
