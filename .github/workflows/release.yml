name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: handoff-linux-x86_64
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: handoff-macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact: handoff-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build release binary
        working-directory: rust
        run: cargo build --locked --release --bin handoff --manifest-path crates/cli/Cargo.toml --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/handoff" "dist/${{ matrix.artifact }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"
          else
            sha256sum "dist/${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"
          fi
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
