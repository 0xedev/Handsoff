name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: handoff-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: handoff-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: handoff-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build
        run: |
          cd rust
          cargo build --release --target ${{ matrix.target }} -p handoff-cli
          cp target/${{ matrix.target }}/release/handoff ../${{ matrix.artifact }}
      - name: Checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            handoff-linux-x86_64/handoff-linux-x86_64
            handoff-linux-x86_64/handoff-linux-x86_64.sha256
            handoff-macos-x86_64/handoff-macos-x86_64
            handoff-macos-x86_64/handoff-macos-x86_64.sha256
            handoff-macos-aarch64/handoff-macos-aarch64
            handoff-macos-aarch64/handoff-macos-aarch64.sha256
          generate_release_notes: true
